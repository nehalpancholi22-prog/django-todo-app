<!DOCTYPE html>
<html>
<head>
<title>Todo List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">My Todo List</h2>

<div class="card p-4 shadow">

<form method="POST" class="d-flex">
    {% csrf_token %}
    <input type="text" name="title" class="form-control me-2" placeholder="Enter task">
    <button class="btn btn-primary">Add</button>
</form>

<hr>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item d-flex justify-content-between align-items-center">

<div>

{% if task.completed %}
<s>{{ task.title }}</s>
{% else %}
{{ task.title }}
{% endif %}

</div>

<div>

{% if not task.completed %}
<a href="/complete/{{ task.id }}" class="btn btn-success btn-sm">✔</a>
{% endif %}

<a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">Delete</a>

</div>

</li>

{% endfor %}

</ul>

</div>

</div>

</body>
</html>
